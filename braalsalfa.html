<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برا السالفة - المطور مؤمن يوسف</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(20, 20, 20, 0.85);
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #262626;
            --accent-white: #ffffff;
            --danger-red: #ff3333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: url('background.jpg'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* 🌌 الزخرفة الشبكية المتحركة الشفافة */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 1;
            pointer-events: none;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-30px, -30px); }
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9);
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 35px;
            color: var(--text-light);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        h3 {
            font-size: 17px;
            color: var(--text-muted);
            margin-bottom: 15px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--text-light);
            font-size: 16px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-white);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        button {
            width: 100%;
            background-color: var(--accent-white);
            color: #000000;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 12px;
        }

        button:hover {
            background-color: #dddddd;
            transform: translateY(-2px);
        }

        button.secondary-btn {
            background-color: transparent;
            color: var(--text-light);
            border: 1px solid var(--border-color);
        }

        button.secondary-btn:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-white);
        }

        button.start-btn {
            background-color: var(--accent-white);
            color: #000000;
            display: none;
            margin-top: 20px;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        .code-display {
            font-size: 36px;
            font-weight: 900;
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.03);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px dashed var(--border-color);
            display: inline-block;
            margin: 20px 0;
            letter-spacing: 4px;
        }

        .player-list {
            list-style: none;
            margin: 25px 0;
            text-align: right;
            max-height: 200px;
            overflow-y: auto;
        }

        .player-list li {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px 20px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-right: 4px solid var(--accent-white);
            font-size: 15px;
        }

        .secret-box {
            background: var(--accent-white);
            color: #000000;
            padding: 30px 20px;
            border-radius: 12px;
            font-size: 26px;
            font-weight: 800;
            margin: 30px 0;
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: var(--text-muted);
            z-index: 2;
        }

        .footer strong {
            color: var(--text-light);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>برا السالفة</h1>

        <div id="homeScreen" class="screen active">
            <button onclick="showScreen('createScreen')">إنشاء غرفة جديدة</button>
            <button onclick="showScreen('joinScreen')" class="secondary-btn">انضمام إلى غرفة</button>
        </div>

        <div id="createScreen" class="screen">
            <h3>أدخل اسمك يا مؤسس الغرفة</h3>
            <input type="text" id="adminName" placeholder="اسمك الكريم">
            <button id="btnCreate">توليد كود الغرفة</button>
            <button onclick="showScreen('homeScreen')" class="secondary-btn">رجوع</button>
        </div>

        <div id="joinScreen" class="screen">
            <h3>ادخل كود الغرفة واسمك</h3>
            <input type="text" id="joinCode" placeholder="كود الغرفة">
            <input type="text" id="playerName" placeholder="اسمك">
            <button id="btnJoin">دخول الغرفة</button>
            <button onclick="showScreen('homeScreen')" class="secondary-btn">رجوع</button>
        </div>

        <div id="lobbyScreen" class="screen">
            <h3>غرفة رقم</h3>
            <div id="roomCodeDisplay" class="code-display"></div>
            <h3>اللاعبين المتواجدين (<span id="playerCount">0</span>)</h3>
            <ul id="playerList" class="player-list"></ul>
            
            <button id="startGameBtn" class="start-btn">ابدأ اللعبة 🚀</button>
            <p id="waitingMessage" style="color: var(--text-muted); margin-top: 15px;">بإنتظار مؤسس الغرفة يبدأ اللعبة...</p>
        </div>

        <div id="gameScreen" class="screen">
            <h2 id="categoryDisplay" style="margin-bottom: 10px; font-size: 20px; color: var(--text-muted);">فئة السالفة: </h2>
            <div id="secretDisplay" class="secret-box"></div>
            <p style="color: var(--text-muted); margin-bottom: 25px;">تناقشوا وقفشوا مين اللي برا السالفة! 🧐</p>
            <button id="btnReset" class="secondary-btn">العودة للغرفة</button>
        </div>
    </div>

    <div class="footer">
        تم إنشاء الغرفة بواسطة المطور <strong>مؤمن يوسف</strong>
    </div>

    <script>
        // دمج بيانات الـ Config الحقيقية والخاصة بمشروع مؤمن يوسف هنا مباشرة
        const firebaseConfig = {
            apiKey: "AIzaSyAdEzHyipaklEkr7QnV1jKu_GdrpwBZInk",
            authDomain: "barra-alsalfa.firebaseapp.com",
            databaseURL: "https://barra-alsalfa-default-rtdb.firebaseio.com",
            projectId: "barra-alsalfa",
            storageBucket: "barra-alsalfa.firebasestorage.app",
            messagingSenderId: "997462084225",
            appId: "1:997462084225:web:703364aee68e72216d1b80",
            measurementId: "G-1H41EGBG93"
        };

        // تهيئة فايربيز أونلاين حقيقي الآن
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const databaseWords = {
            "كورة": ["ريال مدريد", "برشلونة", "ميسي", "رونالدو", "صلاح", "تسلل", "ضربة جزاء", "حكم", "كأس العالم", "دوري الأبطال", "أوفسايد", "فاول", "كرت أحمر", "كرت أصفر", "حارس مرمى", "دفاع", "هجوم", "خط وسط", "مدرب", "شورت", "ستاد", "جمهور", "صفارة", "عارضة", "شباك", "كابتن", "ضربة ركنية", "وقت إضافي", "ركلات ترجيح", "كرة ذهبية", "هاتريك", "مانشستر سيتي", "ليفربول", "بايرن ميونخ", "الأهلي", "الزمالك", "الهلال", "النصر", "منتخب", "تغيير لاعب", "إصابة", "نقالة", "كوب الشاي للمحلل", "فار VAR", "رأسية", "مقصية", "تمريرة حاسمة", "مراوغة", "سوبر هاتريك", "شوط أول"],
            "حيوانات": ["أسد", "نمر", "فهد", "فيل", "زرافة", "قرد", "غزال", "ثعلب", "ذئب", "دب", "أرنب", "سنجاب", "حصان", "حمار", "بقرة", "خروف", "ماعز", "جمل", "كلب", "قطة", "فأر", "خفاش", "دولفين", "حوت", "قرش", "أخطبوط", "تمساح", "ثعبان", "سلحفاة", "ضفدع", "بطريق", "نعامة", "صقر", "نسر", "بومة", "ببّغاء", "دجاجة", "بطة", "حمامة", "طاووس", "كانغرو", "كوالا", "باندا", "حيوان الكسلان", "قنفذ", "وحيد القرن", "سيد قشطة", "غوريلا", "شمبانزي", "سنجاب طائر"],
            "ملابس": ["قميص", "بنطلون", "تيشرت", "جاكيت", "فستان", "تنورة", "بلوفر", "بدلة", "بيجامة", "عباءة", "معطف", "شورت", "شراب", "حذاء", "بوت", "صندل", "شبشب", "قبعة", "كاب", "كوفية", "قفازات", "وشاح", "كرافتة", "حزام", "ساعة يد", "نظارة شمسية", "ملابس رياضية", "بشت", "جلابية", "مايوه", "ملابس داخلية", "جاكيت جلد", "قميص جينز", "بنطلون قماش", "سويت شيرت", "هودي", "كارديجان", "بلوزة", "شال", "طرحة", "طاقية صوف", "إكسسوارات", "محفظة", "بروش", "أزرار أكمام", "بندانا", "حذاء رياضي", "مظلة", "شنطة ظهر", "جاكيت جينز"],
            "أكل": ["بيتزا", "برجر", "شاورما", "كوشري", "ملوخية", "كباب", "كفتة", "فراخ مشوية", "سمك مقلي", "سوشي", "باستا", "لازانيا", "حواوشي", "فتة", "محشي ورق عنب", "كرنب", "بامية", "مكرونة بشاميل", "طعمية", "فول", "بطاطس محمرة", "سلطة", "شوربة عدس", "مندي", "كبسة", "برياني", "شيش طاووق", "حمام محشي", "سجق", "كبدة", "نودلز", "تاكو", "بان كيك", "وافل", "كريب", "كيكة شوكولاتة", "بسبوسة", "كنافة", "أم علي", "سي فود", "أرز باللبن", "جيلي", "آيس كريم", "كرواسون", "دونتس", "فطير مشلتت", "مسقعة", "شكشوكة", "قلقاس", "شوربة لسان عصفور"],
            "بلاد": ["مصر", "السعودية", "الإمارات", "الكويت", "قطر", "البحرين", "عمان", "العراق", "الأردن", "فلسطين", "لبنان", "سوريا", "المغرب", "تونس", "الجزائر", "ليبيا", "السودان", "اليمن", "تركيا", "أمريكا", "بريطانيا", "فرنسا", "ألمانيا", "إيطاليا", "إسبانيا", "البرتغال", "روسيا", "الصين", "اليابان", "كوريا الجنوبية", "الهند", "البرازيل", "الأرجنتين", "كندا", "أستراليا", "المكسيك", "جنوب أفريقيا", "هولندا", "بلجيكا", "سويسرا", "السويد", "النرويج", "اليونان", "النمسا", "ماليزيا", "إندونيسيا", "تايلاند", "سنغافورة", "نيوزيلندا", "كولومبيا"]
        };

        let myName = "";
        let roomCode = "";
        let isAdmin = false;

        document.getElementById('btnCreate').onclick = createRoom;
        document.getElementById('btnJoin').onclick = joinRoom;
        document.getElementById('startGameBtn').onclick = startGame;
        document.getElementById('btnReset').onclick = resetGame;

        window.showScreen = function(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function createRoom() {
            const adminInput = document.getElementById('adminName').value.trim();
            if (!adminInput) return alert("اكتب اسمك أولاً!");
            
            myName = adminInput;
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            isAdmin = true;

            db.ref('rooms/' + roomCode).set({
                admin: myName,
                status: "waiting",
                players: [myName],
                impostors: [],
                category: "",
                word: ""
            }).then(() => {
                listenToRoom();
                showScreen('lobbyScreen');
                document.getElementById('startGameBtn').style.display = 'block';
                document.getElementById('waitingMessage').style.display = 'none';
            });
        }

        function joinRoom() {
            const codeInput = document.getElementById('joinCode').value.trim();
            const nameInput = document.getElementById('playerName').value.trim();

            if (!codeInput || !nameInput) return alert("املا البيانات كاملة!");

            roomCode = codeInput;
            myName = nameInput;

            db.ref('rooms/' + roomCode).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    let roomData = snapshot.val();
                    let currentPlayers = roomData.players || [];
                    
                    if(!currentPlayers.includes(myName)){
                        currentPlayers.push(myName);
                    }

                    db.ref('rooms/' + roomCode).update({ players: currentPlayers }).then(() => {
                        isAdmin = false;
                        listenToRoom();
                        showScreen('lobbyScreen');
                    });
                } else {
                    alert("الغرفة مش موجودة! اتأكد من الكود.");
                }
            });
        }

        function listenToRoom() {
            db.ref('rooms/' + roomCode).on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) return;
                renderRoom(data);
            });
        }

        function renderRoom(data) {
            document.getElementById('roomCodeDisplay').innerText = roomCode;
            document.getElementById('playerCount').innerText = data.players.length;
            
            const listElement = document.getElementById('playerList');
            listElement.innerHTML = "";
            data.players.forEach(p => {
                const li = document.createElement('li');
                li.innerText = p + (p === data.admin ? " 👑" : "");
                listElement.appendChild(li);
            });

            if (data.status === "playing") {
                document.getElementById('categoryDisplay').innerText = `فئة السالفة: [ ${data.category} ]`;
                const secretBox = document.getElementById('secretDisplay');
                
                if (data.impostors.includes(myName)) {
                    secretBox.innerText = "🤫 أنت برا السالفة! خمن والعب بذكاء وفك الشفرة!";
                    secretBox.style.backgroundColor = "rgba(255, 51, 51, 0.15)";
                    secretBox.style.color = "var(--danger-red)";
                    secretBox.style.border = "1px solid var(--danger-red)";
                } else {
                    secretBox.innerText = `السالفة هي: ${data.word}`;
                    secretBox.style.backgroundColor = "rgba(255, 255, 255, 0.95)";
                    secretBox.style.color = "#000000";
                    secretBox.style.border = "none";
                }
                showScreen('gameScreen');
            }
            
            if (data.status === "waiting") {
                showScreen('lobbyScreen');
            }
        }

        function startGame() {
            if (!isAdmin) return;
            db.ref('rooms/' + roomCode).once('value').then((snapshot) => {
                const data = snapshot.val();
                const players = data.players;
                const playersCount = players.length;

                const categories = Object.keys(databaseWords);
                const randomCategory = categories[Math.floor(Math.random() * categories.length)];
                const wordsList = databaseWords[randomCategory];
                const secretWord = wordsList[Math.floor(Math.random() * wordsList.length)];

                let impostorsCount = 1;
                if (playersCount > 5) {
                    impostorsCount = Math.random() > 0.5 ? 2 : 1;
                }

                let shuffled = [...players].sort(() => 0.5 - Math.random());
                let impostors = shuffled.slice(0, impostorsCount);

                db.ref('rooms/' + roomCode).update({
                    status: "playing",
                    category: randomCategory,
                    word: secretWord,
                    impostors: impostors
                });
            });
        }

        function resetGame() {
            db.ref('rooms/' + roomCode).update({
                status: "waiting",
                impostors: [],
                category: "",
                word: ""
            });
        }
    </script>
</body>
</html>
